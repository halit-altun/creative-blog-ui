[build]
  command = "npm install && npm install --prefix backend && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"
  included_files = ["backend/src/lib/**"]

# API routes must come before SPA fallback
[[redirects]]
  from = "/api/blogs"
  to = "/.netlify/functions/blogs"
  status = 200
  force = true

[[redirects]]
  from = "/api/blogs/:category"
  to = "/.netlify/functions/blog?category=:category"
  status = 200
  force = true

[[redirects]]
  from = "/api/mail/send"
  to = "/.netlify/functions/mail-send"
  status = 200
  force = true

# SPA fallback: client-side routes (/home, /about, ...) must serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
