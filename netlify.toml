[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"
  included_files = ["server/**", "netlify/functions/_shared/**"]

# API routes must come before SPA fallback
[[redirects]]
  from = "/api/blogs"
  to = "/.netlify/functions/blogs"
  status = 200
  force = true

[[redirects]]
  from = "/api/blogs/:category"
  to = "/.netlify/functions/blog?category=:category"
  status = 200
  force = true

# SPA fallback: client-side routes (/home, /about, ...) must serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
